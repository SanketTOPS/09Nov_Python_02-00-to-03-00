<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRUD App - Dashboard</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-black via-gray-900 to-black min-h-screen text-white">

    <!-- Navbar -->
    <nav class="bg-black/60 backdrop-blur-md shadow-lg border-b border-gray-700">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-wide">CRUD Dashboard</h1>

            <a href="/insert"
                class="bg-white text-black px-5 py-2 rounded-lg font-semibold hover:bg-gray-200 transition">
                + Add Data
            </a>
        </div>
    </nav>

    <!-- Table Section -->
    <div class="max-w-7xl mx-auto px-4 py-10">

        <div class="overflow-x-auto rounded-2xl shadow-2xl border border-gray-700">
            <table class="w-full text-left border-collapse">

                <thead class="bg-white text-black">
                    <tr>
                        <th class="px-6 py-4">ID</th>
                        <th class="px-6 py-4">Name</th>
                        <th class="px-6 py-4">Email</th>
                        <th class="px-6 py-4">Mobile</th>
                        <th class="px-6 py-4">DOB</th>
                        <th class="px-6 py-4 text-center">Actions</th>
                    </tr>
                </thead>

                <tbody>

                    {% for i in data %}

                    <tr class="border-b border-gray-700 hover:bg-gray-800 transition duration-300">

                        <td class="px-6 py-4">{{ i.id }}</td>
                        <td class="px-6 py-4">{{ i.name }}</td>
                        <td class="px-6 py-4">{{ i.email }}</td>
                        <td class="px-6 py-4">{{ i.mobile }}</td>
                        <td class="px-6 py-4">{{ i.dob }}</td>

                        <td class="px-6 py-4 flex justify-center gap-3">

                            <a href="/update/{{i.id}}"
                                class="bg-white text-black px-4 py-2 rounded-lg font-semibold hover:bg-gray-300 transition">
                                Edit
                            </a>

                            <a href="/delete/{{i.id}}"
                                class="bg-red-600 text-white px-4 py-2 rounded-lg font-semibold hover:bg-red-700 transition">
                                Delete
                            </a>

                        </td>
                    </tr>

                    {% endfor %}

                </tbody>

            </table>
        </div>
    </div>

</body>

</html>
