{% extends 'base.html' %}

{% block title %}Verify OTP - BatchProject{% endblock %}

{% block content %}
<div class="glass-card p-8 rounded-2xl shadow-2xl w-full max-w-md text-center">
    <h2 class="text-3xl font-bold text-gray-800 mb-2">Verify OTP</h2>
    <p class="text-gray-600 mb-6">Enter the 6-digit code sent to your email.</p>
    <form method="post" class="space-y-6">
        {% csrf_token %}
        <div>
            <input type="text" name="otp" required maxlength="6" pattern="\d{6}" class="block w-full text-center text-4xl tracking-widest font-bold px-4 py-4 border border-gray-300 rounded-lg focus:ring-yellow-500 focus:border-yellow-500 transition" placeholder="000000">
        </div>
        <button type="submit" class="w-full bg-yellow-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-yellow-700 transform hover:scale-[1.02] transition-all duration-200">
            Verify & Proceed
        </button>
    </form>
    <div class="mt-6">
        <a href="{% url 'register' %}" class="text-gray-500 text-sm hover:text-yellow-600">Back to Registration</a>
    </div>
</div>
{% endblock %}
