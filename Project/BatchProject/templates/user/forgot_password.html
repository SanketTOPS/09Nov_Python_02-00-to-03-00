{% extends 'base.html' %}

{% block title %}Forgot Password - BatchProject{% endblock %}

{% block content %}
<div class="glass-card p-8 rounded-2xl shadow-2xl w-full max-w-md">
    <h2 class="text-3xl font-bold text-gray-800 mb-6 text-center">Forgot Password</h2>
    <p class="text-gray-600 mb-6 text-center text-sm">Enter your registered email address and we'll send you an OTP to reset your password.</p>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-gray-700">Email Address</label>
            <input type="email" name="email" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-yellow-500 focus:border-yellow-500 transition" placeholder="example@email.com">
        </div>
        <button type="submit" class="w-full bg-yellow-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-yellow-700 transform hover:scale-[1.02] transition-all duration-200">
            Send OTP
        </button>
    </form>
    <p class="mt-6 text-center text-gray-600">
        Remembered your password? <a href="{% url 'login' %}" class="text-yellow-600 font-bold hover:underline">Login</a>
    </p>
</div>
{% endblock %}
