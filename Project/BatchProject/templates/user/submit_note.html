{% extends 'base.html' %}

{% block title %}Submit Note - BatchProject{% endblock %}

{% block content %}
<div class="glass-card p-8 rounded-2xl shadow-2xl w-full max-w-2xl">
    <div class="flex items-center mb-6">
        <a href="{% url 'dashboard' %}" class="mr-4 text-gray-400 hover:text-yellow-600 transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
        </a>
        <h2 class="text-3xl font-bold text-gray-800">Submit New Note</h2>
    </div>

    <form method="post" enctype="multipart/form-data" class="space-y-6">
        {% csrf_token %}
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-semibold text-gray-700">Title</label>
                <input type="text" name="title" required placeholder="e.g. Physics Chapter 1" class="mt-1 block w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-yellow-500 focus:border-transparent transition">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700">Category</label>
                <select name="category" required class="mt-1 block w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-yellow-500 focus:border-transparent transition bg-white">
                    <option value="" disabled selected>Select Category</option>
                    <option value="Education">Education</option>
                    <option value="Technology">Technology</option>
                    <option value="Business">Business</option>
                    <option value="Health">Health</option>
                    <option value="Other">Other</option>
                </select>
            </div>
        </div>

        <div>
            <label class="block text-sm font-semibold text-gray-700">Description</label>
            <textarea name="description" rows="4" required placeholder="Describe what this note is about..." class="mt-1 block w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-yellow-500 focus:border-transparent transition"></textarea>
        </div>

        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Attachment (PDF, DOC, Images)</label>
            <div class="relative group">
                <input type="file" name="file" required class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                <div class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center group-hover:border-yellow-500 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 mx-auto text-gray-400 group-hover:text-yellow-500 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                    </svg>
                    <p class="text-gray-500 font-medium">Click to upload or drag and drop</p>
                    <p class="text-xs text-gray-400 mt-1">Maximum file size: 10MB</p>
                </div>
            </div>
        </div>

        <button type="submit" class="w-full bg-yellow-600 text-white font-bold py-4 rounded-xl hover:bg-yellow-700 transform hover:scale-[1.01] transition-all duration-200 shadow-lg">
            Submit for Approval
        </button>
    </form>
</div>
{% endblock %}
