{% extends 'base.html' %}

{% block title %}Reset Password - BatchProject{% endblock %}

{% block content %}
<div class="glass-card p-8 rounded-2xl shadow-2xl w-full max-w-md">
    <h2 class="text-3xl font-bold text-gray-800 mb-6 text-center">New Password</h2>
    <p class="text-gray-600 mb-6 text-center text-sm">Almost there! Choose a strong password for your account.</p>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-gray-700">New Password</label>
            <input type="password" name="password" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-yellow-500 focus:border-yellow-500 transition" placeholder="••••••••">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">Confirm New Password</label>
            <input type="password" name="confirm_password" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-yellow-500 focus:border-yellow-500 transition" placeholder="••••••••">
        </div>
        <button type="submit" class="w-full bg-yellow-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-yellow-700 transform hover:scale-[1.02] transition-all duration-200">
            Reset Password
        </button>
    </form>
</div>
{% endblock %}
